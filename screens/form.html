<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#444749",
                        "on-secondary-container": "#fefcff",
                        "surface-dim": "#cbdbf5",
                        "outline-variant": "#c6c6cd",
                        "primary-container": "#131b2e",
                        "secondary-container": "#316bf3",
                        "on-secondary-fixed": "#00174b",
                        "primary": "#000000",
                        "primary-fixed": "#dae2fd",
                        "background": "#f8f9ff",
                        "surface-container-low": "#eff4ff",
                        "inverse-surface": "#213145",
                        "surface-container-high": "#dce9ff",
                        "on-tertiary-container": "#818486",
                        "surface-container-highest": "#d3e4fe",
                        "surface-variant": "#d3e4fe",
                        "inverse-primary": "#bec6e0",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#eaf1ff",
                        "surface": "#f8f9ff",
                        "tertiary-container": "#191c1e",
                        "on-secondary": "#ffffff",
                        "surface-container": "#e5eeff",
                        "on-primary-fixed-variant": "#3f465c",
                        "on-background": "#0b1c30",
                        "outline": "#76777d",
                        "surface-bright": "#f8f9ff",
                        "tertiary-fixed": "#e0e3e5",
                        "on-primary-fixed": "#131b2e",
                        "secondary-fixed": "#dbe1ff",
                        "secondary-fixed-dim": "#b4c5ff",
                        "on-error": "#ffffff",
                        "on-surface": "#0b1c30",
                        "tertiary": "#000000",
                        "on-tertiary-fixed": "#191c1e",
                        "on-error-container": "#93000a",
                        "surface-tint": "#565e74",
                        "on-secondary-fixed-variant": "#003ea8",
                        "error-container": "#ffdad6",
                        "on-primary-container": "#7c839b",
                        "secondary": "#0051d5",
                        "on-surface-variant": "#45464d",
                        "primary-fixed-dim": "#bec6e0",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "stack-sm": "8px",
                        "stack-lg": "32px",
                        "stack-md": "16px",
                        "gutter": "16px",
                        "margin-page": "24px",
                        "touch-target-min": "48px"
                    },
                    "fontFamily": {
                        "headline-md": ["Public Sans"],
                        "label-bold": ["Public Sans"],
                        "button-text": ["Public Sans"],
                        "body-md": ["Public Sans"],
                        "headline-lg": ["Public Sans"],
                        "body-lg": ["Public Sans"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-bold": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "button-text": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg": ["30px", {"lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen pb-24">
<!-- Top AppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-slate-50 dark:bg-slate-950 border-b border-slate-200 dark:border-slate-800 transition-colors duration-200 ease-in-out">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-50" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-public-sans text-lg font-semibold tracking-tight text-slate-900 dark:text-slate-50">Add Contact</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden border border-outline-variant">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="A clean, professional minimalist profile avatar placeholder for a mobile application interface. The background is a soft, neutral grey-blue, and the silhouette of a person is rendered in a subtle, high-contrast black line art style. The lighting is bright and even, evoking a sense of modern corporate clarity and high-quality digital design." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCCHHdU1O1ECpKgoaX5LaCW6_V3DVoOqbKZFWADISAPGBG3aczs3LeWil4ua9vLOgHDox-OurbqR76-IuHzCZjRFiS5UqfkkSGR--TPZ0lpxqYikKCjGBxFUdQYjxfhFmhzZONFaVph62PZHRGaJFrZVxSGld7lsE6vgY0SeMIQDKu3fXLu_jfFoKmvCSFFDB0UqCewwqbH3XcFsJkhMv5-sSY0tQi0u8PmTEUIEjcmyscm3fKmy_t9pqgyMZ51f2Ktzetq-4Niwag"/>
</div>
</header>
<!-- Main Content Canvas -->
<main class="mt-16 px-margin-page pt-stack-lg max-w-2xl mx-auto">
<!-- Profile Picture Section -->
<div class="flex flex-col items-center mb-stack-lg">
<div class="relative group">
<div class="w-32 h-32 rounded-full bg-white border-2 border-outline-variant flex items-center justify-center overflow-hidden mb-4">
<span class="material-symbols-outlined text-outline text-5xl" data-icon="person">person</span>
</div>
<button class="absolute bottom-4 right-0 bg-secondary-container text-on-secondary-container w-10 h-10 rounded-full flex items-center justify-center shadow-lg border-2 border-white">
<span class="material-symbols-outlined text-xl" data-icon="add_a_photo">add_a_photo</span>
</button>
</div>
<p class="font-label-bold text-label-bold text-on-surface-variant">Add photo</p>
</div>
<!-- Form Section -->
<form class="space-y-stack-lg">
<!-- Full Name -->
<div class="space-y-stack-sm">
<label class="block font-label-bold text-label-bold text-on-surface-variant">Full Name</label>
<div class="relative">
<input class="w-full h-touch-target-min px-4 bg-white border-2 border-outline-variant rounded-xl focus:border-on-primary-fixed focus:ring-0 transition-all font-body-md text-on-surface" placeholder="e.g. Johnathan Smith" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-outline" data-icon="badge">badge</span>
</div>
</div>
</div>
<!-- Phone Number with Country Selector -->
<div class="space-y-stack-sm">
<label class="block font-label-bold text-label-bold text-on-surface-variant">Phone Number</label>
<div class="flex gap-2">
<div class="relative w-28">
<select class="w-full h-touch-target-min pl-3 pr-8 bg-white border-2 border-outline-variant rounded-xl appearance-none focus:border-on-primary-fixed focus:ring-0 font-body-md text-on-surface">
<option>🇺🇸 +1</option>
<option>🇬🇧 +44</option>
<option>🇮🇳 +91</option>
<option>🇦🇺 +61</option>
</select>
<div class="absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none">
<span class="material-symbols-outlined text-outline text-sm" data-icon="expand_more">expand_more</span>
</div>
</div>
<div class="relative flex-1">
<input class="w-full h-touch-target-min px-4 bg-white border-2 border-outline-variant rounded-xl focus:border-on-primary-fixed focus:ring-0 transition-all font-body-md text-on-surface" placeholder="(555) 000-0000" type="tel"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-outline" data-icon="call">call</span>
</div>
</div>
</div>
</div>
<!-- Role / Title -->
<div class="space-y-stack-sm">
<label class="block font-label-bold text-label-bold text-on-surface-variant">Role</label>
<div class="relative">
<input class="w-full h-touch-target-min px-4 bg-white border-2 border-outline-variant rounded-xl focus:border-on-primary-fixed focus:ring-0 transition-all font-body-md text-on-surface" placeholder="e.g. Senior Professor" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-outline" data-icon="work">work</span>
</div>
</div>
</div>
<!-- School / Department -->
<div class="space-y-stack-sm">
<label class="block font-label-bold text-label-bold text-on-surface-variant">School / Department</label>
<div class="relative">
<input class="w-full h-touch-target-min px-4 bg-white border-2 border-outline-variant rounded-xl focus:border-on-primary-fixed focus:ring-0 transition-all font-body-md text-on-surface" placeholder="e.g. Faculty of Engineering" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-outline" data-icon="school">school</span>
</div>
</div>
</div>
<!-- Tags Section -->
<div class="pt-stack-md">
<p class="font-label-bold text-label-bold text-on-surface-variant mb-stack-sm">Tags</p>
<div class="flex flex-wrap gap-2">
<span class="px-4 py-2 bg-secondary-fixed text-on-secondary-fixed-variant rounded-xl font-label-bold text-sm border border-secondary-fixed-dim">Work</span>
<span class="px-4 py-2 bg-surface-container-high text-on-surface-variant rounded-xl font-label-bold text-sm border border-outline-variant">Emergency</span>
<span class="px-4 py-2 bg-surface-container-high text-on-surface-variant rounded-xl font-label-bold text-sm border border-outline-variant">Family</span>
<button class="px-4 py-2 bg-white border-2 border-dashed border-outline text-outline rounded-xl font-label-bold text-sm flex items-center gap-1">
<span class="material-symbols-outlined text-sm" data-icon="add">add</span> New
                    </button>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-stack-lg flex flex-col gap-4">
<button class="w-full h-14 bg-secondary-container text-on-secondary-container font-button-text text-button-text rounded-xl shadow-md active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined" data-icon="save">save</span>
                    Save Contact
                </button>
<button class="w-full h-14 bg-transparent border-2 border-outline-variant text-on-surface-variant font-button-text text-button-text rounded-xl active:bg-surface-container transition-all" type="button">
                    Cancel
                </button>
</div>
</form>
<!-- Informational Card -->
<div class="mt-stack-lg p-6 bg-white rounded-xl border border-outline-variant">
<div class="flex items-start gap-4">
<div class="bg-primary-container p-2 rounded-lg">
<span class="material-symbols-outlined text-white" data-icon="info">info</span>
</div>
<div>
<h4 class="font-label-bold text-label-bold text-on-background">Secure Sync</h4>
<p class="text-on-surface-variant mt-1 text-sm leading-relaxed">This contact will be encrypted and synced across all your devices using our Corporate Security Protocol.</p>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 h-20 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800">
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 pt-2 transition-all hover:text-slate-900 dark:hover:text-slate-100" href="#">
<span class="material-symbols-outlined" data-icon="contacts">contacts</span>
<span class="font-public-sans text-[12px] font-medium">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 pt-2 transition-all hover:text-slate-900 dark:hover:text-slate-100" href="#">
<span class="material-symbols-outlined" data-icon="import_export">import_export</span>
<span class="font-public-sans text-[12px] font-medium">Import</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 pt-2 transition-all hover:text-slate-900 dark:hover:text-slate-100" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-public-sans text-[12px] font-medium">Settings</span>
</a>
</nav>
</body></html>
