<style>

<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-50" data-icon="search">search</span>
<h1 class="font-public-sans text-lg font-semibold tracking-tight text-slate-900 dark:text-slate-50">Contacts</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high ring-1 ring-outline-variant">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="A professional headshot of a friendly user for an account profile avatar. The subject is a person with a warm smile, set against a clean, neutral studio background with soft, high-key lighting. The aesthetic is modern and Corporate, fitting a light-mode UI design with a crisp, high-definition look." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDV4CJx0HDUbm8osFoYS6H0hWxKU_8eKhzUDvPhoRLoR-2Kyyy6gTo_pH0SWatKdRkLcZpG9tf3frIUP9uk4ci4_s4itItOFwctR2OvTnAv93L-v0GObAs40PalaEdXHX262IKaWwsPpza0VwApq6PAwHmLnErt_KHCTdXMzFVgzSP0L_Ji5CQ_kPg9Avb7tNqWzx7G7j0U_3cdy6HxIF56Xd5woMEr8CFe-Nqfd0Sil91Y6dBn87c45BWm4qr2cSCCxkAh_sNV844"/>
</div>
</header>
<main class="pt-20 pb-24 px-margin-page">
<!-- Search Input Section -->
<div class="mb-stack-lg">
<div class="relative flex items-center">
<span class="absolute left-4 material-symbols-outlined text-outline" data-icon="search">search</span>
<input class="w-full h-[56px] pl-12 pr-4 bg-white border-2 border-slate-200 rounded-xl focus:border-secondary transition-all outline-none font-body-md text-on-surface" placeholder="Search contacts" type="text"/>
</div>
</div>
<!-- Filter Chips Section -->
<div class="flex gap-stack-sm overflow-x-auto hide-scrollbar mb-stack-lg -mx-margin-page px-margin-page">
<button class="whitespace-nowrap px-6 py-2 bg-secondary-container text-on-secondary-container rounded-xl font-label-bold text-sm">All</button>
<button class="whitespace-nowrap px-6 py-2 bg-surface-container-highest text-on-surface-variant rounded-xl font-label-bold text-sm hover:bg-surface-container-high transition-colors">Teachers</button>
<button class="whitespace-nowrap px-6 py-2 bg-surface-container-highest text-on-surface-variant rounded-xl font-label-bold text-sm hover:bg-surface-container-high transition-colors">Administration</button>
<button class="whitespace-nowrap px-6 py-2 bg-surface-container-highest text-on-surface-variant rounded-xl font-label-bold text-sm hover:bg-surface-container-high transition-colors">Support</button>
</div>
<!-- Contact List -->
<div class="space-y-stack-md">
<!-- The contact list will be dynamically generated here -->
</div>
</main>
<!-- Floating Action Button (FAB) -->

<span class="font-public-sans text-[12px] font-medium">Home</span>
